version: '3.8'

services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: shopfree-web
    ports:
      - "8080:80"
    volumes:
      - .:/var/www/html
    depends_on:
      - db
    networks:
      - shopfree-network

  db:
    image: mysql:8.0
    container_name: shopfree-db
    ports:
      - "3306:3306"
    environment:
      MYSQL_DATABASE: shopfree
      MYSQL_USER: shopfree_user
      MYSQL_PASSWORD: shopfree_password
      MYSQL_ROOT_PASSWORD: root_password
    volumes:
      - db_data:/var/lib/mysql
      - ./database/initial-database.sql:/docker-entrypoint-initdb.d/initial-database.sql
    networks:
      - shopfree-network

networks:
  shopfree-network:
    driver: bridge

volumes:
  db_data:
